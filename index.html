<!DOCTYPE html>
<html>
<head>
  <title>Dongeng Ajaib</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/blasten/turn.js/turn.min.js"></script>
</head>

<body>

<h1>📚 Pilih Cerita</h1>

<div id="storyList"></div>

<div id="reader" style="display:none;">
  <button onclick="back()">⬅️ Kembali</button>

  <div id="controls">
    <button onclick="startAuto()">🔊 Dibacakan</button>
    <button onclick="stopAuto()">⏸️ Stop</button>
    <button onclick="toggleNight()">🌙</button>
  </div>

  <div id="book"></div>

  <div id="nav">
    <button onclick="prevPage()">⬅️</button>
    <button onclick="nextPage()">➡️</button>
  </div>
</div>

<audio id="audioPlayer"></audio>
<audio id="bgMusic" src="music/bg.mp3" loop></audio>

<script src="stories.js"></script>
<script src="script.js"></script>

</body>
</html>
